exten => s,2,Set(TIMEOUT(response)=10)
exten => s,3,Read(APPTTIME,custom/reminder3,4)
exten => s,4,GotoIf($["foo${APPTTIME}" < "foo1200"]?reminder5,s,1)
exten => s,5,AGI(checktime.php,${APPTDT},${APPTTIME},0,${APPTPHONE})
