; This file contains example extensions_custom.conf entries.
; extensions_custom.conf should be used to include customizations
; to AMP's Asterisk dialplan.

; Extensions in AMP have access to the 'from-internal' context.
; The context 'from-internal-custom' is included in 'from-internal' by default

[from-internal-custom]				

;# // BEGIN Call by Code
exten => 412,1,Answer
exten => 412,2,Wait(1)
exten => 412,3,Set(TIMEOUT(digit)=7)
exten => 412,4,Set(TIMEOUT(response)=10)
exten => 412,5,Playback(pls-entr-num-uwish2-call)
exten => 412,6,Read(DIALCODE,beep,3)
exten => 412,7,NoOp(Name lookup: ${DIALCODE})
exten => 412,8,Set(USERDATA=${ODBC_ASTERIDEX(${DIALCODE})})
exten => 412,9,Set(CALLEE=${CUT(USERDATA,\,,1)})
exten => 412,10,Set(NUM2CALL=${CUT(USERDATA,\,,2)})
exten => 412,11,NoOp(Who to call: ${CALLEE})
exten => 412,12,NoOp(Number to call: ${NUM2CALL})
exten => 412,13,GotoIf($["foo${NUM2CALL}" = "foo"]?17)
exten => 412,14,Playback(calling)
exten => 412,15,Goto(outbound-allroutes,${NUM2CALL},1)
exten => 412,16,Hangup
exten => 412,17,Wait(1)
exten => 412,18,Playback(speed-dial-empty)
exten => 412,19,Hangup
;# // END Call by Code


;# // BEGIN nv-news-yahoo
exten => 951,1,Answer
exten => 951,n,Wait(1)
exten => 951,n,Set(TIMEOUT(digit)=7)
exten => 951,n,Set(TIMEOUT(response)=10)
;exten => 951,n(proceed),agi(picotts.agi,"Please hold a moment while we retrieve the latest Yahoo news headlines.",en-US)
exten => 951,n,Playback(/var/lib/asterisk/agi-bin/pleaseholdyahoo)
exten => 951,n,AGI(nv-news-yahoo.php,8)
exten => 951,n,NoOp(News: ${NEWS})
;exten => 951,n,Flite("${NEWS}")
;exten => 951,n,AGI(picotts.agi,"${NEWS}",en-US)
;exten => 951,n,AGI(picotts.agi,"${NEWS}",en-US)
;exten => 951,n,AGI(ibmtts.php,"${NEWS}")
exten => 951,n,AGI(gtts.php,"${NEWS}","en")
exten => 951,n,Hangup
;# // END nv-news-yahoo

;# // BEGIN Weather by ZIP
exten => 947,1,Answer
exten => 947,n,Wait(1)
exten => 947,n,Set(TIMEOUT(digit)=7)
exten => 947,n,Set(TIMEOUT(response)=10)
;exten => 947,n,agi(picotts.agi,"At the beep enter the five digit zip code for the weather report you wish to retrieve.",en-US)
exten => 947,n,Playback(/var/lib/asterisk/agi-bin/zipcode)
exten => 947,n,Read(ZIPCODE,beep,5)
;exten => 947,n,agi(picotts.agi,"Please hold a moment while we contact the National Weather Service.",en-US)
exten => 947,n,Playback(/var/lib/asterisk/agi-bin/pleaseholdnws)
exten => 947,n,System(sqlite3 /var/lib/asterisk/agi-bin/zipcodes.sqlite "select city,latitude,longitude from zipcodes where zip='${ZIPCODE}'" > /tmp/${ZIPCODE})
exten => 947,n,AGI(nv-weather-zip.php,${ZIPCODE})
exten => 947,n,NoOp(Weather: ${WEATHER})
;exten => 947,n,Flite("${WEATHER}")
;exten => 947,n,AGI(picotts.agi,"${WEATHER}",en-US)
;exten => 947,n,AGI(picotts.agi,"${WEATHER}",en-US)
;exten => 947,n,AGI(ibmtts.php,"${WEATHER}")
exten => 947,n,AGI(gtts.php,"${WEATHER}","en")
exten => 947,n,Hangup
;# // END Weather by ZIP

;# // BEGIN AsteriDex SpeedDial
exten => _000.,1,Answer
exten => _000.,n,SayDigits(${EXTEN:3}) ; extensions dialed with 000 prefix get looked up in AsteriDex
exten => _000.,n,AGI(asteridex.php,${EXTEN})
exten => _000.,n,GotoIf($["${DIAL:0:3}" = "000"]?97)
exten => _000.,n,NoOp(Number to Dial: ${DIAL})
exten => _000.,n,NoOp(Person to Dial: ${DUDE})
exten => _000.,n,AGI(picotts.agi,"Connecting to: ${DUDE}. One moment please.",en-US)
exten => _000.,n,Dial(local/${DIAL}@from-internal)
exten => _000.,n,Goto(outbound-allroutes,${DIAL},1)
exten => _000.,n,Hangup()
exten => _000.,97,Playback(num-not-in-db)
exten => _000.,98,Playback(goodbye)
exten => _000.,99,Hangup()
;# // END AsteriDex SpeedDial

;# // BEGIN Call by Code
exten => 412,1,Answer
exten => 412,2,Wait(1)
exten => 412,3,Set(TIMEOUT(digit)=7)
exten => 412,4,Set(TIMEOUT(response)=10)
exten => 412,5,GotoIf($[${STAT(e,/usr/bin/swift)}]?8)
exten => 412,6,AGI(picotts.agi,"At the beep enter the first three letters of the name of the person you wish to contact.",en-US)
exten => 412,7,Goto(412,9)
exten => 412,8,Swift("At the beep enter the first three letters of the name of the person you wish to contact.")
exten => 412,9,Read(DIALCODE,beep,3)
exten => 412,10,NoOp(Name lookup: ${DIALCODE})
exten => 412,11,AGI(nv-callwho2.php,${DIALCODE})
exten => 412,12,NoOp(Number to call: ${NUM2CALL})
exten => 412,13,GotoIf($["foo${NUM2CALL}" = "foo0"]?15)
exten => 412,14,Goto(outbound-allroutes,${NUM2CALL},1)
exten => 412,15,Wait(1)
exten => 412,16,Hangup
;# // END Call by Code

;# // BEGIN Call by Name
exten => 411,1,Answer
exten => 411,2,Wait(1)
exten => 411,3,Set(TIMEOUT(digit)=7)
exten => 411,4,Set(TIMEOUT(response)=10)
exten => 411,5,GotoIf($[${STAT(e,/usr/bin/swift)}]?8)
exten => 411,6,AGI(picotts.agi,"At the beep say the name of the person or company you wish to call. Then press the pound key.",en-US)
exten => 411,7,Goto(411,9)
exten => 411,8,Swift("At the beep say the name of the person or company you wish to call. Then press the pound key.")
exten => 411,9(record),agi(speech-recog.agi,en-US)
exten => 411,10,Noop(= Script returned: ${status} , ${id} , ${confidence} , ${utterance} =)
exten => 411,11,AGI(nv-callwho.php,${utterance})
exten => 411,12,NoOp(Number to call: ${NUM2CALL})
exten => 411,13,GotoIf($["foo${NUM2CALL}" = "foo0"]?15)
exten => 411,14,Goto(outbound-allroutes,${NUM2CALL},1)
exten => 411,15,Wait(1)
exten => 411,16,Hangup
;# // END Call by Name

;# // BEGIN SMS Dictator
exten => 767,1,Answer
exten => 767,n,Wait(1)
exten => 767,n,AGI(picotts.agi,"Please enter the 10 digit S M S number.",en-US)
exten => 767,n,Read(SMSNUM,beep,10)
exten => 767,n,AGI(picotts.agi,"S M S message will be sent two.",en-US)
exten => 767,n,SayDigits("${SMSNUM}")
exten => 767,n,AGI(picotts.agi,"To proceed, press 1.",en-US)
exten => 767,n,Read(MYPICK,beep,1)
exten => 767,n,GotoIf($["foo${MYPICK}" = "foo1"]?smsrecord:smsdone)
exten => 767,n(smsrecord),AGI(picotts.agi,"After the beep. I will reecord your S M S message. When you're finished. press the pound key.",en-US)
exten => 767,n,Set(RANDFILE=${RAND(8000,8599)})
exten => 767,n,Record(/tmp/${RANDFILE}.wav,3,10)
exten => 767,n,AGI(picotts.agi,"I think you said:",en-US)
exten => 767,n,Playback(/tmp/${RANDFILE})
exten => 767,n,AGI(picotts.agi,"If this is correct, press 1.",en-US)
exten => 767,n,Read(MYCHOICE,beep,1)
exten => 767,n,GotoIf($["foo${MYCHOICE}" = "foo1"]?smsproceed:smsdone)
exten => 767,n(smsproceed),AGI(picotts.agi,"One moment please while we send your message.",en-US)
exten => 767,n,AGI(smsgen.sh,${RANDFILE},${SMSNUM})
exten => 767,n,AGI(picotts.agi,"S M S message has been sent.",en-US)
exten => 767,n(smsdone),Playback(goodbye)
exten => 767,n,Hangup
;# // END SMS Dictator

;# // BEGIN Travelin' Man 4 Dialer
exten => 864,1,Answer
exten => 864,n,Wait(2)
exten => 864,n,AGI(picotts.agi,"Please enter your account number.",en-US)
exten => 864,n,Read(MYACCTNO,beep,8)
exten => 864,n,NoOp(ACCTNO: ${MYACCTNO})
exten => 864,n,AGI(picotts.agi,"Please enter your PIN.",en-US)
exten => 864,n,Read(MYPIN,beep,5)
exten => 864,n,NoOp(PIN: ${MYPIN})
exten => 864,n,Set(USERDATA=${ODBC_TRAVMAN4(${MYACCTNO})})
exten => 864,n,GotoIf($["${USERDATA},foo" = ",foo"]?notfound)
exten => 864,n,Set(ACCTNO=${CUT(USERDATA,\,,1)})
exten => 864,n,Set(PIN=${CUT(USERDATA,\,,2)})
exten => 864,n,GotoIf($["${MYPIN}" = "${PIN}"]?anothertry:notfound)
exten => 864,n(theanswer),AGI(picotts.agi,"Account number:",en-US)
exten => 864,n,SayDigits(${ACCTNO})
exten => 864,n,AGI(picotts.agi,"PIN:",en-US)
exten => 864,n,SayDigits(${PIN})
exten => 864,n,NoOp(Entry: ${ACCTNO} - ${PIN})
exten => 864,n(anothertry),AGI(picotts.agi,"After the beep. Please enter I.P. add dress using the star key for periods. Press pound key when finished.",en-US)
exten => 864,n,Read(MYIP,beep,16)
exten => 864,n,AGI(picotts.agi,"I P Add Dress:",en-US)
exten => 864,n,SayDigits(${MYIP})
exten => 864,n(confirm),AGI(picotts.agi,"After the beep. Press 1 to process this entry. Or press 2 to start over.",en-US)
exten => 864,n,Read(REPEAT,beep,1)
exten => 864,n,GotoIf($["${REPEAT}" = "2"]?anothertry)
exten => 864,n,GotoIf($["${REPEAT}" = "1"]?saveit)
exten => 864,n,Goto(confirm)
exten => 864,n,AGI(picotts.agi,"Entry aborted. Have a nice day. Good bye.",en-US)
exten => 864,n,Hangup
exten => 864,n(notfound),AGI(picotts.agi,"No matching entry on file. Good bye.",en-US)
exten => 864,n,Hangup
exten => 864,n(saveit),System(echo -e "${MYIP}" > /etc/asterisk/tm4/${ACCTNO})
exten => 864,n,AGI(picotts.agi,"Your I P address has been saved. An e mail will be sent when new address has been activated. Good bye.",en-US)
exten => 864,n,Hangup
;# // END Travelin' Man 4 Dialer

;# // BEGIN Wolfram Alpha
; Wolfram Alpha Dialplan Interface for Incredible PBX servers
; Before use, enter your Wolfram Alpha App ID in /var/lib/asterisk/agi-bin/wolfram.sh
; See the Nerd Vittles tutorial for details: http://nerdvittles.com/?p=798
exten => 4747,1,Answer()
exten => 4747,n,Wait(1)
exten => 4747,n,AGI(picotts.agi,"After the beep, Say your command, then Press the pound key.",en-US)
exten => 4747,n,Set(RANDFILE=${RAND(8000,8599)})
exten => 4747,n,Record(/tmp/${RANDFILE}.wav,3,10)
exten => 4747,n,AGI(picotts.agi,"I think you said:",en-US)
exten => 4747,n,Playback(/tmp/${RANDFILE})
exten => 4747,n,AGI(picotts.agi,"If this is correct, press 1.",en-US)
exten => 4747,n,Read(MYCHOICE,beep,1)
exten => 4747,n,GotoIf($["foo${MYCHOICE}" = "foo1"]?wolfproceed:wolfdone)
exten => 4747,n(wolfproceed),AGI(picotts.agi,"One moment please while we contact Wolfram Alpha.",en-US)
exten => 4747,n,AGI(wolfram.sh,${RANDFILE})
exten => 4747,n,Set(foo=${FILE(/tmp/results.txt)})
exten => 4747,n,AGI(picotts.agi,"${foo}",en-US)
exten => 4747,n(wolfdone),AGI(picotts.agi,"Have a nice day. Good bye.",en-US)
exten => 4747,n,hangup
;# // END Wolfram Alpha

