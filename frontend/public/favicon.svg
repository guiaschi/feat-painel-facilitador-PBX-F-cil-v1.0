<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Fundo escuro com cantos arredondados idêntico ao ícone enviado -->
  <rect width="100" height="100" rx="24" fill="#141416" />
  
  <!-- Parte Superior Rosa (V deitado para a esquerda) -->
  <path 
    d="M 64 26 L 36 50 L 52 50" 
    stroke="#fe398a" 
    stroke-width="7.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
  
  <!-- Parte Inferior Branca (V deitado para a direita) -->
  <path 
    d="M 36 74 L 64 50 L 48 50" 
    stroke="#ffffff" 
    stroke-width="7.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
</svg>